<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90日プログラム</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#FAF7F4;--card:#FFF;--primary:#8B7355;--primary-light:#B5A48B;
    --primary-dark:#6B5740;--accent:#C4956A;--text:#3D3530;--text-light:#7A6F66;
    --border:#E8E0D8;--shadow:0 2px 16px rgba(59,46,37,.07);--radius:14px;
    --green:#C47A8A;--green-bg:#FDF0F3;
    --warm:#E8A87C;--warm-bg:#FDF6F0;
  }
  body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);line-height:1.8;-webkit-tap-highlight-color:transparent;min-height:100vh}
  .app{max-width:640px;margin:0 auto;padding:0 16px 80px}

  /* ヘッダー */
  .header{text-align:center;padding:40px 16px 20px}
  .header h1{font-size:22px;font-weight:700;line-height:1.5;margin-bottom:4px}
  .header h1 em{font-style:normal;color:var(--accent)}
  .header .sub{font-size:13px;color:var(--text-light)}

  /* 進捗バー */
  .progress-area{margin:20px 0 28px}
  .progress-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .progress-day{font-size:28px;font-weight:700;color:var(--accent)}
  .progress-phase{font-size:12px;font-weight:600;color:var(--primary-light);background:var(--bg);border:1px solid var(--border);padding:3px 12px;border-radius:20px}
  .progress-bar-wrap{height:6px;background:var(--border);border-radius:6px;overflow:hidden}
  .progress-bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),#D4A574);border-radius:6px;transition:width .5s}
  .progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-light);margin-top:6px}

  /* 今日のテーマ */
  .theme-card{background:linear-gradient(135deg,#F5EDE4 0%,#FAF7F4 100%);border-radius:var(--radius);padding:24px;margin-bottom:16px;text-align:center}
  .theme-label{font-size:12px;font-weight:600;color:var(--primary-light);letter-spacing:.1em;margin-bottom:8px}
  .theme-text{font-size:17px;font-weight:600;line-height:1.7;color:var(--text)}
  .theme-desc{font-size:14px;color:var(--text-light);margin-top:8px;line-height:1.8}

  /* セクション */
  .section{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 22px;margin-bottom:16px}
  .section h3{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .section h3 .icon{font-size:18px}
  .section p{font-size:14px;line-height:2;color:var(--text)}

  /* テキストエリア */
  .journal-area{width:100%;min-height:100px;padding:14px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;line-height:1.8;color:var(--text);background:var(--bg);resize:vertical;outline:none;transition:.2s}
  .journal-area:focus{border-color:var(--accent)}
  .journal-area::placeholder{color:var(--primary-light)}
  .journal-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:8px;display:block}
  .journal-hint{font-size:12px;color:var(--text-light);margin-bottom:10px;line-height:1.6}
  .journal-group{margin-bottom:20px}
  .journal-group:last-child{margin-bottom:0}

  /* 5段階 */
  .scale-wrap{margin-bottom:20px}
  .scale-label{font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;display:block}
  .scale-options{display:flex;justify-content:space-between;gap:4px}
  .scale-btn{flex:1;padding:12px 4px;border:2px solid var(--border);border-radius:10px;background:var(--card);cursor:pointer;text-align:center;font-family:inherit;transition:.2s}
  .scale-btn:hover{border-color:var(--primary-light)}
  .scale-btn.selected{border-color:var(--accent);background:var(--accent);color:#fff}
  .scale-num{font-size:18px;font-weight:700;display:block}
  .scale-text{font-size:10px;display:block;margin-top:2px}

  /* ミッション */
  .mission-box{background:var(--green-bg);border:1.5px solid #E4B8C2;border-radius:12px;padding:20px}
  .mission-title{font-size:13px;font-weight:700;color:var(--green);margin-bottom:8px}
  .mission-text{font-size:15px;font-weight:600;color:#8B4A5A;line-height:1.7;margin-bottom:8px}
  .mission-desc{font-size:13px;color:var(--text-light);line-height:1.7}
  .mission-check{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid #E4B8C2;cursor:pointer}
  .mission-checkbox{width:22px;height:22px;border:2px solid #D4A0B0;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:.2s;flex-shrink:0}
  .mission-checkbox.checked{background:var(--green);border-color:var(--green)}
  .mission-checkbox.checked::after{content:'\2713';color:#fff;font-size:14px;font-weight:700}
  .mission-check span{font-size:14px;color:var(--text)}

  /* 保存ボタン */
  .save-btn{display:block;width:100%;background:var(--primary);color:#fff;font-family:inherit;font-size:16px;font-weight:600;border:none;border-radius:40px;padding:16px;cursor:pointer;transition:.3s;letter-spacing:.05em;margin-top:8px}
  .save-btn:hover{background:var(--primary-dark)}
  .save-btn:active{transform:scale(.98)}
  .saved-msg{text-align:center;font-size:14px;color:var(--green);font-weight:600;margin-top:12px;display:none}
  .saved-msg.show{display:block;animation:fadeIn .3s ease}

  /* 褒めカード */
  .praise-card{background:linear-gradient(135deg,#FDF6F0 0%,#FAF0E6 100%);border:1.5px solid #E8CDB5;border-radius:var(--radius);padding:28px 24px;margin-bottom:16px;text-align:center}
  .praise-icon{font-size:36px;margin-bottom:12px}
  .praise-title{font-size:18px;font-weight:700;color:var(--accent);margin-bottom:8px;line-height:1.6}
  .praise-text{font-size:14px;color:var(--text);line-height:2}
  .praise-stat{display:inline-block;background:var(--card);border-radius:10px;padding:8px 16px;margin:12px 4px 0;font-size:13px;color:var(--primary);font-weight:600;box-shadow:var(--shadow)}

  /* 成長グラフ */
  .growth-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 22px;margin-bottom:16px}
  .growth-card h3{font-size:14px;font-weight:600;color:var(--primary);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
  .growth-chart{display:flex;align-items:flex-end;gap:6px;height:120px;padding:0 4px}
  .growth-bar{flex:1;background:var(--border);border-radius:4px 4px 0 0;min-height:4px;transition:height .5s;position:relative}
  .growth-bar.filled{background:linear-gradient(180deg,var(--accent),#D4A574)}
  .growth-bar.today{background:linear-gradient(180deg,var(--warm),#E8A87C)}
  .growth-bar-label{position:absolute;bottom:-20px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--text-light);white-space:nowrap}
  .growth-legend{display:flex;justify-content:center;gap:16px;margin-top:28px;font-size:12px;color:var(--text-light)}
  .growth-legend span::before{content:'';display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:4px;vertical-align:middle}
  .growth-legend .leg-past::before{background:var(--accent)}
  .growth-legend .leg-today::before{background:var(--warm)}

  /* 過去ログ */
  .log-card{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:12px}
  .log-date{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:8px}
  .log-q{font-size:12px;color:var(--text-light);margin-bottom:2px}
  .log-a{font-size:14px;color:var(--text);margin-bottom:12px;line-height:1.8}
  .log-scale{display:inline-block;font-size:12px;background:var(--bg);padding:2px 10px;border-radius:10px;color:var(--text-light);margin-bottom:4px}
  .log-mission{font-size:13px;color:var(--green);margin-top:4px}

  /* タブ */
  .tab-bar{display:flex;gap:0;margin:0 0 20px;border-bottom:1.5px solid var(--border)}
  .tab{flex:1;padding:12px 8px;font-size:14px;font-weight:500;text-align:center;color:var(--text-light);cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
  .tab.active{color:var(--accent);border-bottom-color:var(--accent)}

  .empty{text-align:center;padding:40px 20px;color:var(--text-light);font-size:14px}

  /* ワーク一覧 */
  .phase-section{margin-bottom:24px}
  .phase-title{font-size:13px;font-weight:700;color:var(--accent);margin-bottom:10px;padding:4px 0;letter-spacing:.05em}
  .day-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}
  .day-cell{position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--card);border:1.5px solid var(--border);border-radius:10px;cursor:pointer;transition:.2s;font-family:inherit}
  .day-cell:hover{border-color:var(--primary-light);transform:translateY(-1px)}
  .day-cell .day-num{font-size:13px;font-weight:700;color:var(--text)}
  .day-cell .day-theme{font-size:8px;color:var(--text-light);text-align:center;line-height:1.3;margin-top:2px;padding:0 2px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
  .day-cell.done{background:var(--green-bg);border-color:#E4B8C2}
  .day-cell.done .day-num{color:var(--green)}
  .day-cell.done::after{content:'\2713';position:absolute;top:3px;right:5px;font-size:10px;color:var(--green);font-weight:700}
  .day-cell.current{border-color:var(--accent);box-shadow:0 0 0 2px rgba(196,149,106,.2)}
  .back-to-list{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-light);cursor:pointer;padding:8px 0;margin-bottom:8px;background:none;border:none;font-family:inherit;transition:.2s}
  .back-to-list:hover{color:var(--text)}

  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @media(max-width:480px){
    .header h1{font-size:20px}
    .progress-day{font-size:24px}
    .scale-text{font-size:9px}
    .day-grid{grid-template-columns:repeat(5,1fr);gap:6px}
    .day-cell .day-theme{font-size:7px}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>

// ============================================================
// 状態管理（localStorage）
// ============================================================
const STORAGE_KEY = 'jibunjiku90_data';

function loadData(){
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; }
  catch(e){ return {}; }
}

function saveData(data){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function getDayData(day){
  const data = loadData();
  return data['day'+day] || {};
}

function setDayData(day, dayData){
  const data = loadData();
  data['day'+day] = dayData;
  saveData(data);
}

function isDayDone(day){
  const data = loadData();
  return !!(data['day'+day] && data['day'+day].savedAt);
}

function getCompletedDays(){
  const data = loadData();
  let count = 0;
  for(let d=1; d<=90; d++){
    if(data['day'+d] && data['day'+d].savedAt) count++;
  }
  return count;
}

function getMissionCount(){
  const data = loadData();
  let count = 0;
  for(let d=1; d<=90; d++){
    if(data['day'+d] && data['day'+d].mission) count++;
  }
  return count;
}

function getScaleHistory(){
  const data = loadData();
  const history = [];
  for(let d=1; d<=90; d++){
    const dd = data['day'+d];
    if(dd && dd.s1) history.push({day:d, value:dd.s1});
  }
  return history;
}

// 次にやるべきDay（最初の未完了Day）
function getNextDay(){
  for(let d=1; d<=90; d++){
    if(!isDayDone(d)) return d;
  }
  return 90; // 全部完了
}

function startProgram(){
  const data = loadData();
  data.started = true;
  saveData(data);
  render();
}

function renderLog(){
  const content = document.getElementById('tab-content');
  const data = loadData();
  let html = '';
  let hasLog = false;

  for(let d = 90; d >= 1; d--){
    const dayData = data['day'+d];
    if(!dayData || !dayData.savedAt) continue;
    const p = program.find(x => x.day === d);
    if(!p) continue;

    hasLog = true;
    html += `<div class="log-card" style="cursor:pointer" onclick="openDay(${d})">`;
    html += `<div class="log-date">Day ${d} — ${p.theme}</div>`;

    if(dayData[p.question.id]){
      html += `<div class="log-q">${p.question.label}</div>`;
      html += `<div class="log-a">${dayData[p.question.id].replace(/\n/g,'<br>')}</div>`;
    }

    if(dayData[p.scale.id]){
      html += `<div class="log-scale">${p.scale.label}：${dayData[p.scale.id]} / 5</div>`;
    }

    if(dayData.mission){
      html += `<div class="log-mission">✓ アクション達成</div>`;
    }

    html += `</div>`;
  }

  if(!hasLog){
    html = `<div class="empty">まだ記録がありません。<br>ワーク一覧から始めてみましょう。</div>`;
  }

  content.innerHTML = html;
}

// ============================================================
// 操作
// ============================================================
function selectScale(scaleId, value, day){
  const saved = getDayData(day);
  saved[scaleId] = value;
  setDayData(day, saved);

  for(let i=1;i<=5;i++){
    const el = document.getElementById(`scale_${scaleId}_${i}`);
    if(el) el.className = 'scale-btn' + (i===value?' selected':'');
  }
}

function toggleMission(day){
  const saved = getDayData(day);
  saved.mission = !saved.mission;
  setDayData(day, saved);

  const el = document.getElementById('mission_check');
  if(el){
    el.className = 'mission-checkbox' + (saved.mission?' checked':'');
    el.parentElement.querySelector('span').textContent = saved.mission?'できた！':'できたらチェック';
  }
}

function saveDayData(day){
  const p = program.find(x => x.day === day);
  if(!p) return;

  const saved = getDayData(day);

  const el = document.getElementById('inp_'+p.question.id);
  if(el) saved[p.question.id] = el.value;

  saved.savedAt = new Date().toISOString();
  setDayData(day, saved);

  const msg = document.getElementById('saved-msg');
  if(msg){ msg.className = 'saved-msg show'; setTimeout(()=>msg.className='saved-msg',2000); }

  // 保存後にヘッダーの数字を更新
  setTimeout(()=>render(), 500);
}

function switchTab(tab){
  currentTab = tab;
  viewingDay = null;
  render();
}

// 初期表示
render();
</script>
</body>
